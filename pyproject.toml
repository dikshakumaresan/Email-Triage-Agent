[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "email-triage-agent"
version = "1.0.0"
description = "An OpenEnv RL environment for email triage"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }

dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
]
